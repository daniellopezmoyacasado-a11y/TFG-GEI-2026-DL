{% extends "base.html" %}

{% block title %}Issuer Error{% endblock %}

{% block content %}

<h1 class="danger-title">Something went wrong</h1>

<div class="error-box">
    {% if status_code %}
        <p><strong>Status:</strong> {{ status_code }}</p>
    {% endif %}
    <p><strong>Error:</strong> {{ error }}</p>
</div>

<a class="page-link" href="{{ back_url or '/dashboard' }}">Back</a>

{% endblock %}
